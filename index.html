<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>妖怪合成</title>
<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Press+Start+2P&family=Noto+Serif+JP:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f0e4c8; --paper-dark:#d8c8a0; --ink:#2a1810;
    --ink-soft:#5a4030; --red-seal:#b03020; --gold:#c8a030;
    --bg-1:#1a0e08; --bg-2:#3a1810;
    --tier1:#d4e8a8; --tier2:#a8d8e8; --tier3:#e8a8d4;
    --tier4:#c8a8e8; --tier5:#e8c8a8; --tier6:#e8a8a8;
    --tier7:#ff5252; --tier8:#ffd93d;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}
  html,body{height:100%;overflow:hidden;background:#000;font-family:'Noto Serif JP',serif;color:var(--ink)}
  body{display:flex;align-items:center;justify-content:center}
  .phone{
    width:100%;max-width:420px;height:100vh;max-height:900px;
    position:relative;overflow:hidden;background:var(--paper);
    border:2px solid #2a1810;border-radius:24px;box-shadow:0 0 60px rgba(176,48,32,0.3);
  }
  .screen{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}
  .screen.active{display:flex}

  /* Paper texture background */
  .paper-bg{
    background:
      radial-gradient(circle at 20% 30%,rgba(176,48,32,0.04),transparent 50%),
      radial-gradient(circle at 80% 70%,rgba(200,160,48,0.05),transparent 50%),
      var(--paper);
    background-image:
      repeating-linear-gradient(45deg,transparent 0,transparent 2px,rgba(42,24,16,0.015) 2px,rgba(42,24,16,0.015) 4px);
  }

  /* ============ TITLE ============ */
  #title{
    align-items:center;padding-top:30px;
  }
  .title-meta{
    position:absolute;top:14px;left:14px;right:14px;display:flex;justify-content:space-between;z-index:10;
  }
  .meta-pill{
    background:rgba(255,255,255,0.6);padding:8px 14px;border-radius:18px;font-size:12px;
    color:var(--ink);border:1px solid rgba(42,24,16,0.15);
  }

  .title-art{
    margin-top:80px;text-align:center;z-index:3;position:relative;
  }
  .vertical-jp{
    writing-mode:vertical-rl;text-orientation:upright;display:inline-block;position:relative;
    font-family:'Yuji Syuku','Noto Serif JP',serif;font-size:54px;
    font-weight:900;color:var(--ink);letter-spacing:6px;
    text-shadow:2px 2px 0 rgba(176,48,32,0.4),-2px 0 0 rgba(240,228,200,0.6),4px -3px 0 rgba(255,255,255,0.25);
    line-height:1.1;
  }
  .vertical-jp::after{
    content:'妖怪合成';position:absolute;left:50%;top:0;transform:translateX(-50%);
    writing-mode:vertical-rl;text-orientation:upright;color:rgba(255,255,255,0.28);
    clip-path:polygon(0 8%,100% 0,100% 16%,0 24%,0 44%,100% 38%,100% 48%,0 56%,0 76%,100% 70%,100% 80%,0 88%);
    pointer-events:none;
  }
  .title-en{
    margin-top:12px;font-family:'Press Start 2P',monospace;font-size:11px;color:var(--ink-soft);letter-spacing:6px;
  }
  .seal{
    position:absolute;top:80px;right:50px;width:50px;height:50px;
    background:var(--red-seal);border-radius:6px;display:flex;align-items:center;justify-content:center;
    color:#fff;font-family:'Yuji Syuku',serif;font-size:14px;font-weight:900;
    transform:rotate(-8deg);box-shadow:0 4px 8px rgba(176,48,32,0.3);writing-mode:vertical-rl;
    letter-spacing:2px;
  }
  .yokai-illust{
    margin-top:30px;display:flex;justify-content:center;gap:12px;z-index:3;
  }
  .yokai-card{
    width:60px;height:80px;background:rgba(240,228,200,0.8);border:2px solid var(--ink);
    border-radius:6px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 8px rgba(0,0,0,0.15);position:relative;
    animation:floatCard 2s ease-in-out infinite;
  }
  .yokai-card:nth-child(2){animation-delay:0.3s}
  .yokai-card:nth-child(3){animation-delay:0.6s}
  .yokai-card:nth-child(4){animation-delay:0.9s}
  .yokai-card:nth-child(5){animation-delay:1.2s}
  @keyframes floatCard{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-6px) rotate(2deg)}}
  .yokai-card .lvl{position:absolute;top:-6px;left:-6px;width:18px;height:18px;background:var(--ink);color:var(--paper);border-radius:50%;font-size:9px;font-family:'Press Start 2P';display:flex;align-items:center;justify-content:center}
  .yokai-art{display:flex;align-items:center;justify-content:center;width:100%;height:100%}
  .yokai-art svg{width:82%;height:82%;filter:drop-shadow(0 2px 0 rgba(42,24,16,0.28))}

  .leaderboard-preview{
    position:absolute;bottom:160px;left:24px;right:24px;background:rgba(255,255,255,0.6);
    border:1px solid rgba(42,24,16,0.15);border-radius:12px;padding:12px 14px;z-index:3;
  }
  .lb-title{font-size:11px;color:var(--ink-soft);font-family:'Press Start 2P';letter-spacing:2px;margin-bottom:8px;display:flex;justify-content:space-between}
  .lb-title b{color:var(--red-seal)}
  .lb-row{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:4px}
  .lb-row .rk{width:18px;height:18px;background:var(--ink);color:var(--paper);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-family:'Press Start 2P'}
  .lb-row.you{font-weight:700;color:var(--red-seal)}
  .lb-row .nm{flex:1}
  .lb-row .sc{font-family:'Press Start 2P';font-size:11px}

  .start-btn{
    position:absolute;bottom:80px;left:50%;transform:translateX(-50%);
    padding:16px 50px;background:linear-gradient(180deg,var(--red-seal),#8a2010);
    color:var(--paper);border:none;border-radius:6px;font-family:'Noto Serif JP',serif;
    font-size:20px;font-weight:900;cursor:pointer;letter-spacing:6px;z-index:5;
    box-shadow:0 6px 0 #5a1008,0 12px 24px rgba(176,48,32,0.3);
    border:2px solid #fff;
  }
  .start-btn:active{transform:translateX(-50%) translateY(3px);box-shadow:0 3px 0 #5a1008}
  .title-tip{position:absolute;bottom:40px;left:0;right:0;text-align:center;font-size:11px;color:var(--ink-soft);z-index:5}

  /* ============ GAME ============ */
  #game{padding-top:0}
  .game-hud{
    height:60px;padding:0 14px;display:flex;align-items:center;justify-content:space-between;z-index:10;
    background:rgba(255,255,255,0.5);border-bottom:1px solid rgba(42,24,16,0.15);
  }
  .hud-stat{display:flex;flex-direction:column;align-items:center;gap:0}
  .hud-stat .l{font-size:9px;color:var(--ink-soft);letter-spacing:1px;font-family:'Press Start 2P'}
  .hud-stat .v{font-size:18px;font-weight:900;color:var(--ink);font-family:'Press Start 2P'}
  .hud-stat.score .v{color:var(--red-seal)}
  .hud-stat.tier .v{color:var(--gold)}

  .game-stage{flex:1;display:flex;flex-direction:column;align-items:center;padding:14px;position:relative}
  .next-display{
    width:100%;display:flex;align-items:center;justify-content:space-between;
    padding:8px 12px;background:rgba(255,255,255,0.4);border-radius:10px;margin-bottom:10px;
    border:1px solid rgba(42,24,16,0.1);
  }
  .next-display .lbl{font-size:10px;color:var(--ink-soft);font-family:'Press Start 2P';letter-spacing:1px}
  .next-display .row{display:flex;align-items:center;gap:8px}
  .next-yokai{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--ink);position:relative}
  .next-yokai .l{position:absolute;top:-4px;right:-4px;width:14px;height:14px;background:var(--ink);color:var(--paper);border-radius:50%;font-size:8px;font-family:'Press Start 2P';display:flex;align-items:center;justify-content:center}

  /* Board */
  .board-wrap{
    position:relative;background:rgba(255,255,255,0.5);
    border:3px solid var(--ink);border-radius:8px;padding:6px;
    box-shadow:0 0 0 4px var(--paper-dark),0 8px 16px rgba(0,0,0,0.2);
  }
  .board{
    position:relative;background:
      repeating-linear-gradient(0deg,rgba(42,24,16,0.04) 0,rgba(42,24,16,0.04) 1px,transparent 1px,transparent 8px),
      repeating-linear-gradient(90deg,rgba(42,24,16,0.04) 0,rgba(42,24,16,0.04) 1px,transparent 1px,transparent 8px),
      rgba(240,228,200,0.7);
    border-radius:4px;overflow:hidden;
  }
  .board-grid{
    display:grid;width:100%;height:100%;gap:2px;padding:4px;
  }
  .cell-slot{
    background:rgba(42,24,16,0.06);border-radius:4px;position:relative;
  }
  .yokai-tile{
    position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;
    border-radius:6px;border:2px solid var(--ink);
    transition:left 0.18s cubic-bezier(.6,1.5,.4,1),top 0.18s cubic-bezier(.6,1.5,.4,1),transform 0.2s;
    box-shadow:0 3px 0 var(--ink),inset 0 2px 4px rgba(255,255,255,0.4);
    cursor:grab;
  }
  .yokai-tile.dragging{cursor:grabbing;z-index:50;box-shadow:0 8px 16px rgba(0,0,0,0.3)}
  .yokai-tile.merge-target{box-shadow:0 0 0 3px var(--gold),0 0 18px rgba(200,160,48,0.95),0 3px 0 var(--ink)}
  .yokai-tile.long-preview{filter:brightness(1.12)}
  .yokai-tile.merging{animation:mergePop 0.4s forwards}
  @keyframes mergePop{0%{transform:scale(1)}50%{transform:scale(1.3);filter:brightness(1.5)}100%{transform:scale(0);opacity:0}}
  .yokai-tile.spawn{animation:spawnPop 0.3s}
  @keyframes spawnPop{0%{transform:scale(0)}80%{transform:scale(1.15)}100%{transform:scale(1)}}
  .yokai-tile .tier{position:absolute;top:-6px;left:-6px;width:18px;height:18px;background:var(--ink);color:var(--paper);border-radius:50%;font-size:9px;font-family:'Press Start 2P';display:flex;align-items:center;justify-content:center}
  .yokai-tile.t1{background:linear-gradient(135deg,var(--tier1),#a8c878)}
  .yokai-tile.t2{background:linear-gradient(135deg,var(--tier2),#78a8c8)}
  .yokai-tile.t3{background:linear-gradient(135deg,var(--tier3),#c878a8)}
  .yokai-tile.t4{background:linear-gradient(135deg,var(--tier4),#a878c8)}
  .yokai-tile.t5{background:linear-gradient(135deg,var(--tier5),#c89878)}
  .yokai-tile.t6{background:linear-gradient(135deg,var(--tier6),#c87878)}
  .yokai-tile.t7{background:linear-gradient(135deg,var(--tier7),#a83020);color:#fff;box-shadow:0 0 12px rgba(255,82,82,0.6),0 3px 0 var(--ink)}
  .yokai-tile.t8{background:radial-gradient(circle,var(--tier8),#a87820);color:var(--ink);box-shadow:0 0 16px rgba(255,217,61,0.8),0 3px 0 var(--ink)}

  /* Spawn next button */
  .next-btn-area{
    width:100%;margin-top:14px;display:flex;gap:10px;align-items:center;
  }
  .drop-btn{
    flex:1;padding:14px 0;background:linear-gradient(180deg,var(--red-seal),#8a2010);
    color:var(--paper);border:none;border-radius:8px;font-family:'Noto Serif JP';font-size:14px;font-weight:900;
    cursor:pointer;letter-spacing:3px;box-shadow:0 4px 0 #5a1008;border:2px solid #fff;
  }
  .drop-btn:disabled{opacity:0.4;cursor:not-allowed}
  .drop-btn:active:not(:disabled){transform:translateY(2px);box-shadow:0 2px 0 #5a1008}
  .ad-revive-btn{
    padding:10px 14px;background:#fff;border:2px solid var(--red-seal);
    color:var(--red-seal);border-radius:8px;font-family:'Press Start 2P';font-size:10px;cursor:pointer;
    box-shadow:0 4px 0 var(--red-seal);position:relative;
  }
  .ad-revive-btn::before{content:'AD';position:absolute;top:-7px;right:-7px;background:#e8483a;color:#fff;font-size:8px;padding:1px 4px;border-radius:4px;font-family:'Press Start 2P'}

  /* Score popup */
  .float-pop{
    position:absolute;font-family:'Press Start 2P';font-size:14px;font-weight:900;
    pointer-events:none;z-index:60;animation:floatPop 1s ease-out forwards;
  }
  @keyframes floatPop{0%{opacity:1;transform:translate(-50%,0) scale(0.6)}40%{opacity:1;transform:translate(-50%,-20px) scale(1.2)}100%{opacity:0;transform:translate(-50%,-50px) scale(1)}}
  .toast{
    position:absolute;left:50%;top:176px;transform:translateX(-50%);z-index:80;
    padding:8px 14px;border-radius:18px;background:rgba(25,66,34,.78);color:#fff;
    font-size:12px;font-weight:900;opacity:0;pointer-events:none;
  }
  .toast.show{animation:toastShow 1.1s ease-out forwards}
  @keyframes toastShow{0%{opacity:0;transform:translateX(-50%) translateY(8px)}20%,75%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-8px)}}
  .merge-burst{position:absolute;pointer-events:none;z-index:70;left:0;top:0}
  .merge-burst i{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 10px var(--gold);animation:burstOut 0.56s ease-out forwards}
  @keyframes burstOut{from{opacity:1;transform:translate(0,0) scale(1)}to{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0.25)}}
  .board.merge-shock{animation:boardShock 0.22s ease-out}
  @keyframes boardShock{0%,100%{transform:translateX(0)}35%{transform:translateX(-3px)}70%{transform:translateX(3px)}}

  /* Tier evolution chain (collapsed) */
  .evo-bar{
    width:100%;margin-top:10px;padding:8px;background:rgba(255,255,255,0.4);
    border:1px solid rgba(42,24,16,0.1);border-radius:8px;
    display:flex;align-items:center;gap:4px;overflow-x:auto;
  }
  .evo-step{flex-shrink:0;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:1.5px solid var(--ink);background:rgba(42,24,16,0.06)}
  .evo-step.reached{background:linear-gradient(135deg,var(--tier3),var(--tier5));border-color:var(--red-seal)}
  .evo-arrow{color:var(--ink-soft);font-size:10px}

  .sound-btn{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.7);border:none;font-size:16px;cursor:pointer;z-index:20}

  /* ============ RESULT ============ */
  #result{padding:20px 22px;overflow-y:auto}
  .r-title-vert{
    text-align:center;writing-mode:vertical-rl;text-orientation:upright;
    display:inline-block;margin:10px auto 0;font-family:'Yuji Syuku',serif;font-size:32px;color:var(--ink);
    letter-spacing:6px;font-weight:900;
  }
  .r-title-wrap{text-align:center}
  .r-sub{text-align:center;margin-top:8px;font-family:'Press Start 2P';font-size:10px;color:var(--ink-soft);letter-spacing:3px}
  .r-score-row{margin-top:16px;display:flex;align-items:center;justify-content:center;gap:14px}
  .r-rank{width:72px;height:72px;border-radius:50%;background:radial-gradient(circle,var(--gold),#a87820);color:var(--paper);font-family:'Press Start 2P';font-size:32px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(200,160,48,0.5),inset 0 0 10px rgba(255,255,255,0.3);border:3px solid #fff}
  .r-score-big{font-family:'Press Start 2P';font-size:36px;color:var(--red-seal)}

  .r-stats{margin-top:16px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .r-stat{background:rgba(255,255,255,0.5);border-radius:10px;padding:10px 6px;text-align:center;border:1px solid rgba(42,24,16,0.1)}
  .r-stat .v{font-family:'Press Start 2P';font-size:14px;color:var(--ink)}
  .r-stat .l{font-size:10px;color:var(--ink-soft);margin-top:4px}

  /* Highest yokai showcase */
  .top-yokai-box{
    margin-top:16px;background:rgba(255,255,255,0.5);border:2px solid var(--ink);
    border-radius:12px;padding:14px;display:flex;align-items:center;gap:14px;
  }
  .top-yokai-art{width:72px;height:72px;border-radius:10px;background:linear-gradient(135deg,var(--tier6),var(--tier7));display:flex;align-items:center;justify-content:center;font-size:42px;border:2px solid var(--ink);box-shadow:0 4px 0 var(--ink)}
  .top-yokai-info .nm{font-family:'Yuji Syuku',serif;font-size:18px;color:var(--ink);font-weight:900}
  .top-yokai-info .tt{font-size:11px;color:var(--ink-soft);margin-top:3px}
  .top-yokai-info .desc{font-size:10px;color:var(--ink-soft);margin-top:5px;line-height:1.4}

  /* Leaderboard */
  .lb-box{
    margin-top:16px;background:rgba(255,255,255,0.5);border:1px solid rgba(42,24,16,0.15);
    border-radius:12px;padding:12px 14px;
  }
  .lb-box .h{font-family:'Press Start 2P';font-size:10px;color:var(--ink-soft);letter-spacing:2px;margin-bottom:10px;display:flex;justify-content:space-between}
  .lb-box .h b{color:var(--red-seal)}
  .lb-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px dashed rgba(42,24,16,0.1)}
  .lb-row:last-child{border-bottom:none}
  .lb-row .rk{width:22px;height:22px;background:var(--ink);color:var(--paper);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'Press Start 2P'}
  .lb-row .rk.gold{background:var(--gold)}
  .lb-row .rk.silver{background:#a8a8a8}
  .lb-row .rk.bronze{background:#a87838}
  .lb-row .av{width:26px;height:26px;border-radius:50%;background:rgba(42,24,16,0.1);display:flex;align-items:center;justify-content:center;font-size:14px}
  .lb-row .nm{flex:1;font-size:12px}
  .lb-row.you{background:rgba(176,48,32,0.1);border-radius:6px;padding:6px 8px}
  .lb-row.you .nm{font-weight:900;color:var(--red-seal)}
  .lb-row .sc{font-family:'Press Start 2P';font-size:12px;color:var(--ink)}

  .invite-box{
    margin-top:14px;background:linear-gradient(135deg,rgba(176,48,32,0.15),rgba(200,160,48,0.12));
    border:2px dashed var(--red-seal);border-radius:14px;padding:14px;
    display:flex;align-items:center;gap:12px;
  }
  .invite-box .txt{flex:1;font-size:11px;color:var(--ink);line-height:1.5}
  .invite-box .txt b{color:var(--red-seal)}
  .invite-box button{background:var(--red-seal);color:#fff;border:none;padding:8px 14px;border-radius:18px;font-size:11px;font-weight:900;cursor:pointer;border:2px solid #fff;box-shadow:0 3px 0 #5a1008}
  .ticket-card{width:58px;height:70px;flex-shrink:0;border:2px solid var(--ink);border-radius:8px;background:linear-gradient(160deg,#fff7d8,#c8a030);box-shadow:0 4px 0 var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transform:rotate(-4deg)}
  .ticket-card .mark{width:28px;height:28px;border-radius:50%;background:var(--red-seal);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Yuji Syuku';font-size:18px}
  .ticket-card .cap{font-size:8px;font-family:'Press Start 2P';color:var(--ink)}

  .actions{margin-top:18px;display:flex;gap:10px;padding-bottom:14px}
  .actions button{flex:1;padding:14px 0;border:none;border-radius:8px;font-family:'Noto Serif JP';font-size:14px;font-weight:900;cursor:pointer;letter-spacing:2px;border:2px solid var(--ink)}
  .btn-home{background:rgba(255,255,255,0.5);color:var(--ink)}
  .btn-again{background:linear-gradient(180deg,var(--red-seal),#8a2010);color:var(--paper);box-shadow:0 4px 0 #5a1008}
  .btn-again:active{transform:translateY(2px);box-shadow:0 2px 0 #5a1008}

  /* ============ CLEAN CAMPAIGN UI OVERRIDE ============ */
  :root{
    --grass:#20c847; --grass-2:#77e55d; --lime:#c8ff2d; --sky:#56c6ff;
    --cream:#fff8df; --tile:#f5f7f0; --tile-side:#b8d8d1; --orange:#ffb333;
    --pink:#ff5b7a; --blue:#20a8ff; --purple:#8a6cff; --text:#194222;
    --soft:#5f8a66; --red-seal:#ff536b; --gold:#ffc83d; --ink:#194222; --ink-soft:#5f8a66;
    --tier1:#d8ff64; --tier2:#8fe7ff; --tier3:#ffc4e4; --tier4:#ff9f6e;
    --tier5:#d5b4ff; --tier6:#ffcf73; --tier7:#ff7a94; --tier8:#ffe45d;
  }
  html,body{font-family:'Zen Maru Gothic','Noto Serif JP',sans-serif;color:var(--text)}
  .phone{
    background:linear-gradient(180deg,#20c847 0%,#75e85b 64%,#fff3cf 100%);
    border:none;border-radius:0;box-shadow:none;
  }
  .paper-bg{
    background:
      radial-gradient(circle at 18% 18%,rgba(255,255,255,.22),transparent 18%),
      radial-gradient(circle at 86% 28%,rgba(255,255,255,.18),transparent 14%),

  .biz-nav-btn{
    min-width:32px;height:32px;border:0;border-radius:99px;padding:6px;
    display:flex;align-items:center;justify-content:center;gap:4px;
    background:rgba(0,0,0,.2);color:#fff;font-size:14px;font-weight:900;position:relative;
  }
  .biz-nav-icon{width:20px;height:20px;display:block;object-fit:contain}
  .biz-nav-text{padding:6px 12px;font-size:14px;line-height:1.3;white-space:nowrap}

    position:relative;z-index:4;margin:2px 18px 0;color:#fff;font-size:30px;font-weight:900;line-height:1;

  }

<script>
/* ===============================================================
   妖怪合成  Light Demo (drag-merge 2048-like)
   =============================================================== */

const COLS = 5, ROWS = 6;

/* ---------- Yokai tiers ---------- */
const YOKAI = [
  {tier:1, name:'豆豆狸', desc:'弱小な妖。すぐに育つ。'},
  {tier:2, name:'子狐火', desc:'いたずら好きの仔妖。'},
  {tier:3, name:'河童', desc:'川辺に潜む妖怪。'},
  {tier:4, name:'赤鬼', desc:'恐ろしい鬼。'},
  {tier:5, name:'化け猫', desc:'尾が二股に分かれた猫。'},
  {tier:6, name:'天狗', desc:'山に住む高位妖怪。'},
  {tier:7, name:'九尾狐', desc:'伝説の九尾。災いをもたらす。'},
  {tier:8, name:'神龍', desc:'神獣。すべての頂点。'},
];

function yokaiSVG(tier){
  const ink = '#194222';
  const common = inner => `<svg viewBox="0 0 100 100" aria-hidden="true">${inner}</svg>`;
  const art = {
    1: `<ellipse cx="50" cy="58" rx="30" ry="27" fill="#c8ff46"/><path d="M39 30 Q50 18 61 30 Q50 35 39 30Z" fill="#5ac85f"/><circle cx="36" cy="41" r="9" fill="#ff6b82"/><circle cx="64" cy="41" r="9" fill="#ff6b82"/><circle cx="39" cy="55" r="5" fill="${ink}"/><circle cx="61" cy="55" r="5" fill="${ink}"/><path d="M43 67 Q50 73 57 67" stroke="${ink}" stroke-width="5" fill="none" stroke-linecap="round"/><ellipse cx="50" cy="52" rx="7" ry="5" fill="#fff5a2" opacity=".8"/>`,
    2: `<path d="M25 57 Q31 24 50 21 Q69 24 75 57 Q69 80 50 82 Q31 80 25 57Z" fill="#ffbd42"/><path d="M31 35 L26 14 L46 30Z" fill="#ffe36b"/><path d="M69 35 L74 14 L54 30Z" fill="#ffe36b"/><path d="M75 70 Q91 55 77 43 Q85 59 65 65" fill="none" stroke="#ff7a2f" stroke-width="10" stroke-linecap="round"/><circle cx="40" cy="54" r="5" fill="${ink}"/><circle cx="60" cy="54" r="5" fill="${ink}"/><path d="M45 65 Q50 69 55 65" stroke="${ink}" stroke-width="5" fill="none" stroke-linecap="round"/><circle cx="75" cy="37" r="8" fill="#50d6ff"/>`,
    3: `<circle cx="50" cy="59" r="27" fill="#5ee8c1"/><ellipse cx="50" cy="36" rx="24" ry="12" fill="#fff176"/><ellipse cx="50" cy="35" rx="13" ry="5" fill="#7de66b"/><circle cx="38" cy="55" r="5" fill="${ink}"/><circle cx="62" cy="55" r="5" fill="${ink}"/><path d="M40 69 Q50 76 60 69" stroke="${ink}" stroke-width="5" fill="none" stroke-linecap="round"/><path d="M23 61 Q15 53 23 45" stroke="#47c9a7" stroke-width="8" fill="none" stroke-linecap="round"/><path d="M77 61 Q85 53 77 45" stroke="#47c9a7" stroke-width="8" fill="none" stroke-linecap="round"/>`,
    4: `<circle cx="50" cy="58" r="29" fill="#ff5b72"/><path d="M35 35 L31 14 L48 31Z" fill="#ffe36b"/><path d="M65 35 L69 14 L52 31Z" fill="#ffe36b"/><rect x="35" y="67" width="30" height="9" rx="4" fill="#fff"/><circle cx="39" cy="54" r="6" fill="#fff"/><circle cx="61" cy="54" r="6" fill="#fff"/><circle cx="39" cy="54" r="3" fill="${ink}"/><circle cx="61" cy="54" r="3" fill="${ink}"/><path d="M29 45 L20 37" stroke="#fff" stroke-width="6" stroke-linecap="round"/><path d="M71 45 L80 37" stroke="#fff" stroke-width="6" stroke-linecap="round"/>`,
    5: `<circle cx="50" cy="57" r="28" fill="#c9a6ff"/><path d="M32 39 L27 17 L47 32Z" fill="#f0e5ff"/><path d="M68 39 L73 17 L53 32Z" fill="#f0e5ff"/><circle cx="40" cy="55" r="5" fill="${ink}"/><circle cx="60" cy="55" r="5" fill="${ink}"/><path d="M44 67 Q50 71 56 67" stroke="${ink}" stroke-width="5" fill="none" stroke-linecap="round"/><circle cx="50" cy="77" r="7" fill="#ffcf3d"/><path d="M78 66 Q89 51 73 45 Q82 56 68 66" fill="none" stroke="#b487ff" stroke-width="8" stroke-linecap="round"/><path d="M31 60 L20 56 M69 60 L80 56" stroke="#fff" stroke-width="3" stroke-linecap="round"/>`,
    6: `<circle cx="50" cy="58" r="28" fill="#56c6ff"/><path d="M35 35 L50 14 L65 35Z" fill="#ff6b82"/><path d="M47 55 L59 58 L49 72Z" fill="#ffe36b"/><circle cx="39" cy="55" r="5" fill="#fff"/><circle cx="63" cy="55" r="5" fill="#fff"/><circle cx="39" cy="55" r="2" fill="${ink}"/><circle cx="63" cy="55" r="2" fill="${ink}"/><path d="M27 63 Q15 52 29 42" stroke="#fff" stroke-width="8" fill="none" stroke-linecap="round"/><path d="M73 63 Q86 52 71 42" stroke="#fff" stroke-width="8" fill="none" stroke-linecap="round"/><path d="M23 78 L42 69" stroke="#ffcf3d" stroke-width="7" stroke-linecap="round"/>`,
    7: `<circle cx="50" cy="55" r="27" fill="#ffe36b"/><path d="M32 36 L27 16 L47 31Z" fill="#fff6a8"/><path d="M68 36 L73 16 L53 31Z" fill="#fff6a8"/><g stroke="#ff8a32" stroke-width="8" fill="none" stroke-linecap="round"><path d="M25 80 Q14 60 35 51"/><path d="M38 84 Q31 62 45 52"/><path d="M50 86 Q44 63 50 51"/><path d="M62 84 Q69 62 55 52"/><path d="M75 80 Q86 60 65 51"/></g><circle cx="40" cy="54" r="5" fill="${ink}"/><circle cx="60" cy="54" r="5" fill="${ink}"/><path d="M43 66 Q50 70 57 66" stroke="${ink}" stroke-width="5" fill="none" stroke-linecap="round"/>`,
    8: `<path d="M32 67 Q42 86 66 77 Q83 70 73 50" fill="none" stroke="#ff9f1f" stroke-width="13" stroke-linecap="round"/><circle cx="50" cy="50" r="25" fill="#ffdf3d"/><path d="M42 31 L47 13 L54 31Z" fill="#fff7a5"/><path d="M55 31 L63 14 L66 34Z" fill="#fff7a5"/><path d="M34 42 Q22 34 33 26" stroke="#50d6ff" stroke-width="8" fill="none" stroke-linecap="round"/><circle cx="41" cy="50" r="5" fill="${ink}"/><circle cx="61" cy="50" r="5" fill="${ink}"/><path d="M46 64 Q56 70 65 61" stroke="${ink}" stroke-width="5" fill="none" stroke-linecap="round"/><circle cx="76" cy="45" r="6" fill="#ff6b82"/>`
  };
  return common(art[tier] || art[1]);
}

function renderYokai(tier){
  return `<span class="yokai-art" data-yokai="${tier}">${yokaiSVG(tier)}</span>`;
}

function hydrateStaticYokai(){
  document.querySelectorAll('.yokai-art[data-yokai]').forEach(el=>{
    el.innerHTML = yokaiSVG(Number(el.dataset.yokai));
  });
}
hydrateStaticYokai();

/* ---------- Audio ---------- */
let audioCtx=null, soundOn=true;
function ensureAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
function sfx(type){
  if(!soundOn) return;
  ensureAudio();
  const ctx=audioCtx, t=ctx.currentTime;
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  if(type==='place'){o.type='triangle';o.frequency.setValueAtTime(440,t);o.frequency.linearRampToValueAtTime(660,t+0.06);g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.08);o.start(t);o.stop(t+0.09);}
  else if(type==='merge'){[660,880,1100].forEach((f,i)=>{const oo=ctx.createOscillator(),gg=ctx.createGain();oo.connect(gg);gg.connect(ctx.destination);oo.type='triangle';oo.frequency.setValueAtTime(f,t+i*0.04);gg.gain.setValueAtTime(0.13,t+i*0.04);gg.gain.exponentialRampToValueAtTime(0.001,t+i*0.04+0.12);oo.start(t+i*0.04);oo.stop(t+i*0.04+0.13);});}
  else if(type==='chain'){[523,659,784,1047,1318].forEach((f,i)=>{const oo=ctx.createOscillator(),gg=ctx.createGain();oo.connect(gg);gg.connect(ctx.destination);oo.type='square';oo.frequency.setValueAtTime(f,t+i*0.05);gg.gain.setValueAtTime(0.12,t+i*0.05);gg.gain.exponentialRampToValueAtTime(0.001,t+i*0.05+0.15);oo.start(t+i*0.05);oo.stop(t+i*0.05+0.16);});}
  else if(type==='gameover'){o.type='sawtooth';o.frequency.setValueAtTime(440,t);o.frequency.exponentialRampToValueAtTime(110,t+0.6);g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.62);o.start(t);o.stop(t+0.63);}
}

/* ---------- State ---------- */
const state = {
  grid:[], // 2D array, each cell null or {tier, id}
  next:1, nextNext:1,
  score:0, moves:0, merges:0, chainMax:0,
  topTier:1,
  running:false,
  tileMap:new Map(), // id -> tile DOM
  nextId:1,
  cellSize:0,
  leaderboard:[
    {rank:1,name:'Yui-chan',score:12840,avatarTier:2},
    {rank:2,name:'あなた',score:9640,avatarTier:8,you:true},
    {rank:3,name:'Ken-san',score:8200,avatarTier:3},
    {rank:4,name:'Mika-chan',score:7120,avatarTier:1},
    {rank:5,name:'Taro',score:5840,avatarTier:5},
  ],
};

const $ = id => document.getElementById(id);
const board = $('board');
const boardGrid = $('boardGrid');

/* ---------- Screen flow ---------- */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
}
$('startBtn').addEventListener('click', ()=>{ ensureAudio(); startGame(); });
$('btnAgain').addEventListener('click', ()=>{ startGame(); });
$('btnHome').addEventListener('click', ()=>{ showScreen('title'); });
$('navBackBtn').addEventListener('click', ()=>{ state.running=false; showScreen('title'); });
$('soundBtn').addEventListener('click', ()=>{
  soundOn=!soundOn;
  const icon = $('soundIcon');
  icon.src = soundOn ? icon.dataset.on : icon.dataset.off;
});
$('navShareBtn').addEventListener('click', ()=>{ showToast('共有の準備中'); });
$('navMoreBtn').addEventListener('click', ()=>{ showToast('その他'); });
$('hintBtn').addEventListener('click', ()=>{ showHint(); });
$('adReviveBtn').addEventListener('click', ()=>{
  // simulate revive: clear bottom row
  if(state.running) return;
  for(let x=0;x<COLS;x++){
    if(state.grid[ROWS-1][x]){
      const c = state.grid[ROWS-1][x];
      const tile = state.tileMap.get(c.id);
      if(tile) tile.remove();
      state.grid[ROWS-1][x] = null;
    }
  }
  state.running = true;
  showScreen('game');
  showFloat(board, 'AD: 最下段 解除!', '#b03020');
});

/* ---------- Board init ---------- */
function buildBoard(){
  // size: board fits the 30px content margin and keeps cells >=44pt.
  const boardW = 286;
  const boardH = Math.round(boardW * ROWS / COLS);
  board.style.width = boardW+'px';
  board.style.height = boardH+'px';
  boardGrid.style.gridTemplateColumns = `repeat(${COLS},1fr)`;
  boardGrid.style.gridTemplateRows = `repeat(${ROWS},1fr)`;
  boardGrid.innerHTML='';
  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      const c = document.createElement('div');
      c.className='cell-slot';
      c.dataset.x=x; c.dataset.y=y;
      c.addEventListener('click', ()=>onCellClick(x,y));
      boardGrid.appendChild(c);
    }
  }
  // compute cell size
  setTimeout(()=>{
    const slot = boardGrid.children[0];
    if(!slot) return;
    const r = slot.getBoundingClientRect();
    state.cellSize = r.width;
  }, 50);
}

/* ---------- Game start ---------- */
function startGame(){
  state.grid = Array.from({length:ROWS},()=>Array(COLS).fill(null));
  state.tileMap.forEach(t=>t.remove());
  state.tileMap.clear();
  state.score=0; state.moves=0; state.merges=0; state.chainMax=0;
  state.topTier=1; state.nextId=1;
  state.next = pickNextTier();
  state.nextNext = pickNextTier();
  state.running=true;
  $('scoreVal').textContent='0';
  $('tierVal').textContent='Lv1';
  $('movesVal').textContent='0';
  buildBoard();
  // spawn 3 initial random tiles
  for(let i=0;i<4;i++){
    const empty = getEmpty();
    if(empty.length){
      const [x,y] = empty[Math.floor(Math.random()*empty.length)];
      placeTile(x, y, 1+Math.floor(Math.random()*2), false);
    }
  }
  updateNextDisplay();
  updateEvoBar();
  showScreen('game');
  // recompute cell size after screen activated
  setTimeout(()=>{
    const slot = boardGrid.children[0];
    if(slot){ state.cellSize = slot.getBoundingClientRect().width; repositionAll(); }
  }, 100);
}

function pickNextTier(){
  // Mostly tier 1, with the pool warming up after 100 score.
  const r = Math.random();
  if(state.score >= 300){
    if(r < 0.52) return 1;
    if(r < 0.86) return 2;
    return 3;
  }
  if(state.score >= 100){
    if(r < 0.58) return 1;
    if(r < 0.86) return 2;
    return 3;
  }
  if(r < 0.7) return 1;
  if(r < 0.92) return 2;
  return 3;
}

function getEmpty(){
  const out = [];
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++) if(!state.grid[y][x]) out.push([x,y]);
  return out;
}

function placeTile(x, y, tier, animate=true){
  const id = state.nextId++;
  state.grid[y][x] = {tier, id};
  const tile = document.createElement('div');
  tile.className = `yokai-tile t${tier}${animate?' spawn':''}`;
  tile.dataset.id = id;
  tile.innerHTML = `<span class="tier">${tier}</span>${renderYokai(tier)}`;
  tile.style.width = state.cellSize+'px';
  tile.style.height = state.cellSize+'px';
  positionTile(tile, x, y);
  boardGrid.appendChild(tile);
  state.tileMap.set(id, tile);
  bindDrag(tile, id);
  if(tier>state.topTier){ state.topTier = tier; $('tierVal').textContent='Lv'+tier; }
  return id;
}

function boardMetrics(){
  const st = getComputedStyle(boardGrid);
  return {
    gap: parseFloat(st.columnGap) || 0,
    pad: parseFloat(st.paddingLeft) || 0,
  };
}

function positionTile(tile, x, y){
  const slot = boardGrid.children[y*COLS + x];
  if(!slot) return;
  tile.style.left = slot.offsetLeft + 'px';
  tile.style.top = slot.offsetTop + 'px';
  tile.style.width = slot.offsetWidth + 'px';
  tile.style.height = slot.offsetHeight + 'px';
}

function repositionAll(){
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
    const c = state.grid[y][x];
    if(c){
      const tile = state.tileMap.get(c.id);
      if(tile){
        positionTile(tile, x, y);
      }
    }
  }
}

function updateNextDisplay(){
  const d = $('nextDisplay');
  const t = state.next;
  d.className = `next-yokai`;
  d.style.background = `linear-gradient(135deg,var(--tier${t}),var(--tier${Math.min(8,t+1)}))`;
  d.innerHTML = `<span class="l">${t}</span>${renderYokai(t)}`;
}

function showToast(txt){
  const el = $('toast');
  if(!el) return;
  el.textContent = txt;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

/* ---------- Click empty cell to place next ---------- */
function onCellClick(x, y){
  if(!state.running) return;
  if(state.grid[y][x]) return;
  placeTile(x, y, state.next, true);
  sfx('place');
  showToast('配置完了');
  state.moves++;
  $('movesVal').textContent = state.moves;
  state.score += state.next * 2;
  $('scoreVal').textContent = state.score;
  state.next = state.nextNext;
  state.nextNext = pickNextTier();
  updateNextDisplay();
  // check chain merges adjacent
  setTimeout(()=>checkMerges(x,y), 100);
}

/* ---------- Drag tile to swap into empty adjacent ---------- */
function bindDrag(tile, id){
  let dragging=false, startCx=0, startCy=0, fromX=0, fromY=0, longPress=false, longTimer=null;
  tile.addEventListener('pointerdown', e=>{
    if(!state.running) return;
    // find pos
    for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++) if(state.grid[y][x] && state.grid[y][x].id===id){ fromX=x; fromY=y; }
    dragging=true; startCx=e.clientX; startCy=e.clientY;
    tile.classList.add('dragging');
    longPress=false;
    longTimer=setTimeout(()=>{
      longPress=true;
      tile.classList.add('long-preview');
      highlightMergeTargets(fromX, fromY);
      showToast('合成先を表示');
      if(navigator.vibrate) navigator.vibrate(22);
    }, 420);
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  });
  function onMove(e){
    if(!dragging) return;
    const dx = e.clientX - startCx, dy = e.clientY - startCy;
    if(Math.abs(dx)+Math.abs(dy)>12 && longTimer){ clearTimeout(longTimer); longTimer=null; }
    tile.style.transform = `translate(${dx}px,${dy}px)`;
  }
  function onUp(e){
    if(!dragging) return;
    dragging=false;
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    if(longTimer){ clearTimeout(longTimer); longTimer=null; }
    tile.style.transform='';
    tile.classList.remove('dragging','long-preview');
    if(longPress){
      const target = findNearestMergeTarget(fromX, fromY);
      clearMergeTargets();
      if(target){ doMerge(fromX, fromY, target[0], target[1]); }
      return;
    }
    clearMergeTargets();
    // determine target cell
    const hit = document.elementFromPoint(e.clientX, e.clientY);
    const slot = hit && hit.closest ? hit.closest('.cell-slot') : null;
    const tx = slot ? Number(slot.dataset.x) : -1;
    const ty = slot ? Number(slot.dataset.y) : -1;
    if(tx<0||tx>=COLS||ty<0||ty>=ROWS||(tx===fromX&&ty===fromY)){ return; }
    // must be adjacent (orthogonal)
    if(Math.abs(tx-fromX) + Math.abs(ty-fromY) !== 1) return;
    const target = state.grid[ty][tx];
    if(!target){
      // move
      state.grid[ty][tx] = state.grid[fromY][fromX];
      state.grid[fromY][fromX] = null;
      positionTile(tile, tx, ty);
      sfx('place');
      state.moves++; $('movesVal').textContent = state.moves;
      showToast('移動完了');
      setTimeout(()=>checkMerges(tx,ty), 200);
    } else if(target.tier === state.grid[fromY][fromX].tier && target.tier < 8){
      // merge into target
      doMerge(fromX, fromY, tx, ty);
    }
  }
}

function highlightMergeTargets(fromX, fromY){
  clearMergeTargets();
  const src = state.grid[fromY][fromX];
  if(!src || src.tier>=8) return;
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
    const c = state.grid[y][x];
    if(c && c.id!==src.id && c.tier===src.tier){
      const t = state.tileMap.get(c.id);
      if(t) t.classList.add('merge-target');
    }
  }
}
function clearMergeTargets(){
  document.querySelectorAll('.merge-target').forEach(t=>t.classList.remove('merge-target'));
}
function findNearestMergeTarget(fromX, fromY){
  const src = state.grid[fromY][fromX];
  if(!src || src.tier>=8) return null;
  let best=null, bestDist=Infinity;
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
    const c = state.grid[y][x];
    if(c && c.id!==src.id && c.tier===src.tier){
      const d = Math.abs(x-fromX)+Math.abs(y-fromY);
      if(d<bestDist){ best=[x,y]; bestDist=d; }
    }
  }
  return best;
}

/* ---------- Merge logic ---------- */
function doMerge(fromX, fromY, toX, toY){
  const a = state.grid[fromY][fromX];
  const b = state.grid[toY][toX];
  if(!a || !b || a.tier !== b.tier || a.tier>=8) return;
  const newTier = a.tier + 1;
  const tileA = state.tileMap.get(a.id);
  const tileB = state.tileMap.get(b.id);
  // move A into B's position visually
  positionTile(tileA, toX, toY);
  setTimeout(()=>{
    tileA.classList.add('merging');
    tileB.classList.add('merging');
    setTimeout(()=>{
      tileA.remove(); tileB.remove();
      state.tileMap.delete(a.id); state.tileMap.delete(b.id);
      state.grid[fromY][fromX] = null;
      state.grid[toY][toX] = null;
      // place new tier
      const newId = placeTile(toX, toY, newTier, true);
      sfx('merge');
      mergeFeedback(toX, toY, newTier);
      showToast('合成成功');
      state.merges++;
      const gain = newTier * 10;
      state.score += gain;
      $('scoreVal').textContent = state.score;
      showFloatAt(boardGrid, toX, toY, '+'+gain+' Lv'+newTier, '#b03020');
      // chain check
      let chainCount = 1;
      function nextCheck(){
        const merged = findAndMergeFirst(toX, toY);
        if(merged){
          chainCount++;
          if(chainCount > state.chainMax) state.chainMax = chainCount;
          setTimeout(nextCheck, 350);
        } else {
          if(chainCount>=3){ sfx('chain'); showFloat(board, chainCount+' CHAIN!', '#c8a030'); }
          // check game over
          if(getEmpty().length === 0){ endGame(); }
        }
      }
      setTimeout(nextCheck, 350);
    }, 350);
  }, 180);
}

function findAndMergeFirst(centerX, centerY){
  // see if the tile at (centerX,centerY) has a same-tier neighbor
  const c = state.grid[centerY][centerX];
  if(!c) return false;
  const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
  for(const [dx,dy] of dirs){
    const nx = centerX+dx, ny = centerY+dy;
    if(nx<0||nx>=COLS||ny<0||ny>=ROWS) continue;
    const n = state.grid[ny][nx];
    if(n && n.tier === c.tier && c.tier < 8){
      doMerge(nx, ny, centerX, centerY);
      return true;
    }
  }
  return false;
}

function checkMerges(x, y){
  const merged = findAndMergeFirst(x,y);
  if(!merged){
    if(getEmpty().length === 0) endGame();
  }
}

/* ---------- Hint ---------- */
function showHint(){
  if(!state.running) return;
  // find best empty spot near existing same-tier tiles
  let best = null, bestScore = -1;
  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      if(state.grid[y][x]) continue;
      // score = # of adjacent same-tier neighbors that match state.next
      let s = 0;
      [[0,-1],[0,1],[-1,0],[1,0]].forEach(([dx,dy])=>{
        const nx=x+dx,ny=y+dy;
        if(nx>=0&&nx<COLS&&ny>=0&&ny<ROWS && state.grid[ny][nx] && state.grid[ny][nx].tier === state.next) s+=10;
      });
      if(s>bestScore){ bestScore = s; best = [x,y]; }
    }
  }
  if(best){
    const idx = best[1]*COLS + best[0];
    const slot = boardGrid.children[idx];
    if(slot){
      slot.style.boxShadow = '0 0 0 3px var(--gold) inset, 0 0 12px var(--gold)';
      setTimeout(()=>{ slot.style.boxShadow=''; }, 1200);
    }
  }
}

/* ---------- Floats ---------- */
function showFloat(parent, txt, color){
  const f = document.createElement('div');
  f.className='float-pop';
  f.style.color = color;
  f.style.left='50%'; f.style.top='30px';
  f.style.position='absolute';
  f.textContent = txt;
  parent.style.position='relative';
  parent.appendChild(f);
  setTimeout(()=>f.remove(),1000);
}
function showFloatAt(parent, gx, gy, txt, color){
  const slot = boardGrid.children[gy*COLS + gx];
  if(!slot) return;
  const f = document.createElement('div');
  f.className='float-pop';
  f.style.color = color;
  f.style.left = (slot.offsetLeft + slot.offsetWidth/2) + 'px';
  f.style.top = slot.offsetTop + 'px';
  f.textContent = txt;
  parent.appendChild(f);
  setTimeout(()=>f.remove(),1000);
}

function mergeFeedback(gx, gy, tier){
  const slot = boardGrid.children[gy*COLS + gx];
  if(!slot) return;
  board.classList.remove('merge-shock');
  void board.offsetWidth;
  board.classList.add('merge-shock');
  setTimeout(()=>board.classList.remove('merge-shock'),240);
  if(navigator.vibrate) navigator.vibrate([16,24,16]);
  const burst = document.createElement('div');
  burst.className = 'merge-burst';
  burst.style.left = (slot.offsetLeft + slot.offsetWidth/2) + 'px';
  burst.style.top = (slot.offsetTop + slot.offsetHeight/2) + 'px';
  const count = tier>=5 ? 14 : 10;
  for(let i=0;i<count;i++){
    const p = document.createElement('i');
    const angle = Math.PI*2*i/count;
    const dist = 24 + Math.random()*18;
    p.style.setProperty('--dx', Math.cos(angle)*dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle)*dist + 'px');
    p.style.background = tier>=6 ? '#ffe45d' : '#fff';
    burst.appendChild(p);
  }
  boardGrid.appendChild(burst);
  setTimeout(()=>burst.remove(),650);
}

/* ---------- Evo bar ---------- */
function updateEvoBar(){
  const bar = $('evoBar');
  bar.innerHTML='';
  YOKAI.forEach((y,i)=>{
    const step = document.createElement('div');
    step.className = 'evo-step' + (i+1<=state.topTier ? ' reached':'');
    step.innerHTML = renderYokai(y.tier);
    step.title = y.name + ' Lv'+y.tier;
    bar.appendChild(step);
    if(i<YOKAI.length-1){
      const a = document.createElement('div');
      a.className='evo-arrow';a.textContent='›';
      bar.appendChild(a);
    }
  });
}

/* ---------- End game ---------- */
function endGame(){
  if(!state.running) return;
  // check if no more moves possible (board full AND no adjacent same-tier)
  // For light demo: end when board full
  state.running = false;
  sfx('gameover');
  setTimeout(showResult, 600);
}
function showResult(){
  $('finalScore').textContent = state.score;
  $('rsMoves').textContent = state.moves;
  $('rsMerges').textContent = state.merges;
  $('rsChain').textContent = state.chainMax;
  // rank by topTier and score
  let rank='C';
  if(state.topTier>=7 || state.score>=2000) rank='S';
  else if(state.topTier>=5 || state.score>=1000) rank='A';
  else if(state.topTier>=4 || state.score>=500) rank='B';
  $('rankBadge').textContent = rank;
  // top yokai showcase
  const top = YOKAI[state.topTier-1];
  $('topArt').innerHTML = renderYokai(top.tier);
  $('topName').textContent = top.name;
  $('topTier').textContent = 'Lv.'+top.tier+' 妖怪';
  $('topDesc').textContent = top.desc;
  $('topArt').style.background = `linear-gradient(135deg,var(--tier${state.topTier}),var(--tier${Math.min(8,state.topTier+1)}))`;
  $('youSc').textContent = state.score.toLocaleString();
  showScreen('result');
}
</script>
